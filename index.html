<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>D2 Motos Multimarcas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- TOPO -->
    <div class="header">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTbI3gsDW7BcFSG8H-fZGPNIslYQ5Fsy-fw9g&s" class="logo" alt="D2 Motos">
      <h1>@D2MotosMultimarcas</h1>
      <p class="subtitle">Realizando sonhos!</p>
    </div>

    <!-- BANNER -->
    <div class="banner">
      <img src="banner.jpeg" alt="Estoque D2 Motos">
    </div>

    <!-- BOTÕES -->
    <div class="buttons">

      <a href="https://www.d2motos.com.br" target="_blank" class="btn site">
        🌐 Acessar o Site
      </a>

      <button class="btn whatsapp" id="btnWhatsapp">
        💬 Falar no WhatsApp
      </button>

    </div>

    <!-- REDES SOCIAIS -->
    <div class="social">
      <a href="https://instagram.com/d2motosmultimarcas" target="_blank">Instagram</a>
      <a href="https://facebook.com" target="_blank">Facebook</a>
    </div>

    <!-- RODAPÉ -->
    <div class="footer">
      © D2 Motos Multimarcas
    </div>

  </div>

  <!-- SCRIPT SEMPRE NO FINAL -->
  <script src="./server.js"></script>
</body>
</html>
